<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121715" media="(prefers-color-scheme: dark)" />
  <title>My Orders</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="orders-page">
  <main class="customer-shell">
    <button onclick="location.href='/'" id="menuBtn" class="customer-back secondary"></button>

    <section class="customer-hero">
      <div class="customer-topbar">
        <div>
          <div class="customer-eyebrow" id="heroEyebrow"></div>
          <h1 class="customer-heading" id="pageTitle"></h1>
          <p class="customer-subtitle" id="hint"></p>
        </div>
      </div>
    </section>

    <section class="customer-panel">
      <div class="customer-panel-title">
        <div>
          <h3 id="ordersListTitle"></h3>
          <div class="muted" id="ordersListHint"></div>
        </div>
      </div>

      <div id="list" class="customer-list"></div>
    </section>
  </main>

  <script src="/js/translations/en.js"></script>
  <script src="/js/translations/pt.js"></script>
  <script src="/js/translations/fi.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/kof.js"></script>

  <script>
    const t = window.kofI18n.t;

    const menuBtnEl = document.getElementById("menuBtn");
    const pageTitleEl = document.getElementById("pageTitle");
    const hintEl = document.getElementById("hint");
    const listEl = document.getElementById("list");
    const heroEyebrowEl = document.getElementById("heroEyebrow");
    const ordersListTitleEl = document.getElementById("ordersListTitle");
    const ordersListHintEl = document.getElementById("ordersListHint");

    const MY_ORDERS_KEY = "kof_my_orders_v1";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function applyTranslations() {
      document.title = t("orders.title");
      menuBtnEl.innerText = `← ${t("index.title")}`;
      pageTitleEl.innerText = t("orders.title");
      heroEyebrowEl.innerText = t("index.subtitle");
      ordersListTitleEl.innerText = t("orders.title");
      ordersListHintEl.innerText = t("orders.hint");
    }

    function formatTableLabel(value) {
      const normalized = String(value || "").trim();
      return normalized ? `${t("fulfillment.tableLabel")} ${normalized}` : t("fulfillment.tableLabel");
    }

    function openOrder(id) {
      location.href = `/order.html?id=${id}`;
    }

    function statusLabel(status) {
      return t(`status.${status}`);
    }

    function statusPillClass(status) {
      return `pill status-${String(status || "").trim() || "new"}`;
    }

    function destinationMarkup(order) {
      if (order.fulfillment_type === "table") {
        return `<div class="pill paid">${escapeHtml(formatTableLabel(order.table_label))}</div>`;
      }

      return `<div class="pill paid">${escapeHtml(t("fulfillment.counter"))}</div>`;
    }

    async function render() {
      const myOrders = kof.getMyOrders ? kof.getMyOrders() : [];

      if (myOrders.length === 0) {
        hintEl.textContent = t("orders.noneYet");
        ordersListHintEl.innerText = t("orders.noneYet");
        listEl.innerHTML = "";
        return;
      }

      hintEl.textContent = t("orders.hint");
      ordersListHintEl.innerText = t("orders.hint");

      const rows = [];
      const keptEntries = [];

      for (const entry of myOrders) {
        try {
          const order = await kof.fetchOrder(entry.id);
          keptEntries.push(entry);
          rows.push(order);
        } catch {}
      }

      localStorage.setItem(MY_ORDERS_KEY, JSON.stringify(keptEntries));

      if (rows.length === 0) {
        hintEl.textContent = t("orders.noneActive");
        ordersListHintEl.innerText = t("orders.noneActive");
        listEl.innerHTML = "";
        return;
      }

      listEl.innerHTML = rows
        .map((order) => `
          <article class="card customer-order-card" onclick="openOrder(${order.id})">
            <div class="order-meta-row">
              <div>
                <div><b>#${order.order_number}</b></div>
                <div class="muted">${escapeHtml(order.created_at || "")}</div>
              </div>
              <div class="${statusPillClass(order.status)}" id="st-${order.id}">${escapeHtml(statusLabel(order.status))}</div>
            </div>
            <div style="margin-top:12px">${destinationMarkup(order)}</div>
          </article>
        `)
        .join("");
    }

    kof.wsConnect((msg) => {
      if (msg.type === "order_status_changed") {
        const payload = msg.payload;
        const pill = document.getElementById(`st-${payload.id}`);

        if (pill) {
          pill.textContent = statusLabel(payload.status);
          pill.className = statusPillClass(payload.status);
        }
      }

      if (msg.type === "order_created") {
        render();
      }
    });

    window.addEventListener("pageshow", render);

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        render();
      }
    });

    kof.applyCustomerDarkMode();
    applyTranslations();
    render();
  </script>
</body>
</html>
