<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121715" media="(prefers-color-scheme: dark)" />
  <title>Kof Admin</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="admin-page">
  <main class="admin-shell">
  <section class="ops-hero">
    <div>
      <div class="ops-eyebrow" id="adminEyebrow"></div>
      <h1 class="ops-title" id="pageTitle"></h1>
      <p class="ops-subtitle" id="whoLine"></p>
    </div>
    <div class="ops-toolbar" id="adminToolbar" style="display:none">
      <button id="staffBtn" style="display:none" onclick="goStaff()" class="secondary"></button>
      <button onclick="goInventory()" id="inventoryBtn" class="secondary"></button>
      <button onclick="goSettings()" id="settingsBtn" class="secondary"></button>
      <button onclick="logout()" id="logoutBtn" class="secondary danger-soft"></button>
    </div>
  </section>

  <div id="login" class="card admin-login-panel">
    <div class="row">
      <input id="username" value="admin" />
      <div class="pin-field">
        <input id="pin" type="password" inputmode="numeric" />
        <button type="button" class="pin-toggle-btn" onclick="togglePin('pin', this)" tabindex="-1" aria-label="Show PIN"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <button onclick="login()" id="loginBtn"></button>
    </div>
    <div class="muted" id="loginMsg"></div>
  </div>

  <div id="app" style="display:none" class="ops-stack">
    <section class="admin-tabs-panel">
      <div class="admin-tabs" role="tablist" aria-label="Admin sections">
        <button type="button" class="admin-tab active" id="securityTabBtn" data-admin-tab-btn="security"></button>
        <button type="button" class="admin-tab" id="menuTabBtn" data-admin-tab-btn="menu"></button>
        <button type="button" class="admin-tab" id="qrTabBtn" data-admin-tab-btn="qr"></button>
      </div>
    </section>

    <section class="ops-section" data-admin-tab-section="security">
    <div class="card">
      <h3 id="securityTitle"></h3>

      <h4 id="changeMyPinTitle" class="section-field-title"></h4>
      <div class="row">
        <div class="pin-field">
          <input id="oldPin" type="password" inputmode="numeric" />
          <button type="button" class="pin-toggle-btn" onclick="togglePin('oldPin', this)" tabindex="-1" aria-label="Show PIN"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="pin-field">
          <input id="newPin" type="password" inputmode="numeric" />
          <button type="button" class="pin-toggle-btn" onclick="togglePin('newPin', this)" tabindex="-1" aria-label="Show PIN"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <button onclick="changePin()" id="changePinBtn" class="primary"></button>
      </div>
      <div class="muted" id="pinMsg"></div>
    </div>

    <div class="card" id="usersCard" style="display:none">
      <h3 id="usersManagerTitle"></h3>

      <h4 id="createUserTitle" class="section-field-title"></h4>
      <div class="row">
        <input id="uName" />
        <div class="pin-field">
          <input id="uPin" type="password" inputmode="numeric" />
          <button type="button" class="pin-toggle-btn" onclick="togglePin('uPin', this)" tabindex="-1" aria-label="Show PIN"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <select id="uRole">
          <option value="barista">barista</option>
          <option value="manager">manager</option>
        </select>
        <button onclick="createUser()" id="createUserBtn" class="primary"></button>
        <button onclick="loadUsers()" id="refreshUsersBtn" class="primary"></button>
      </div>
      <div class="muted" id="userMsg"></div>

      <h4 style="margin-top:14px" id="userListTitle" class="section-field-title"></h4>
      <div id="users"></div>
      <div class="muted" id="disableHint"></div>
    </div>
    </section>

    <section class="ops-section" data-admin-tab-section="menu" hidden>
    <div class="card">
      <h3 id="addItemTitle" class="section-field-title"></h3>
      <div class="row">
        <input id="newName" />
        <input id="newDesc" />
        <input id="newPrice" inputmode="decimal" />
        <button onclick="addItem()" id="addItemBtn" class="primary"></button>
      </div>
      <div class="muted" id="addMsg"></div>
    </div>

    <div class="card" id="ingredientQuickCard" style="display:none">
      <div class="sectionTitleRow">
        <h3 style="margin:0" id="addIngredientTitle"></h3>
        <button onclick="goInventory()" id="openInventoryBtn" class="primary"></button>
      </div>

      <div class="row" style="margin-top:12px">
        <input id="ingName" />
        <input id="ingUnit" />
        <input id="ingStock" inputmode="decimal" />
        <input id="ingLow" inputmode="decimal" />
        <button onclick="addIngredientQuick()" id="addIngredientBtn" class="primary"></button>
      </div>
      <div class="muted" id="ingredientMsg"></div>
    </div>
    </section>

    <section class="ops-section" data-admin-tab-section="qr" hidden>
    <div class="card" id="wifiQrCard" style="display:none">
      <div class="sectionTitleRow">
        <h3 style="margin:0" id="wifiQrTitle"></h3>
        <button onclick="saveWifiSettings()" id="saveWifiBtn" class="primary"></button>
      </div>

      <div class="row" style="margin-top:12px">
        <input id="wifiSsid" oninput="renderWifiQr()" />
        <select id="wifiSecurity" onchange="renderWifiQr()">
          <option value="WPA">WPA / WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">Open (no password)</option>
        </select>
        <div class="pin-field" id="wifiPasswordField">
          <input id="wifiPassword" type="password" oninput="renderWifiQr()" />
          <button type="button" class="pin-toggle-btn" onclick="togglePin('wifiPassword', this)" tabindex="-1" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>

      <div id="wifiQrPreview" style="margin-top:16px; text-align:center"></div>
      <div style="margin-top:8px; text-align:center">
        <button onclick="printWifiQr()" id="printWifiBtn" class="primary" style="display:none"></button>
      </div>
      <div class="muted" id="wifiQrHint" style="margin-top:8px"></div>
    </div>

    <div class="card" id="tableLinksCard" style="display:none">
      <div class="sectionTitleRow">
        <h3 style="margin:0" id="tableLinksTitle"></h3>
        <button onclick="loadTableLinks()" id="refreshTableLinksBtn" class="primary"></button>
      </div>

      <div class="row" style="margin-top:12px">
        <input id="tableBaseUrl"/>
        <input id="tableLinkCount" inputmode="numeric" value="5" />
        <button onclick="copyTableLinks()" id="copyTableLinksBtn"></button>
        <button onclick="printTableLinks()" id="printTableLinksBtn" class="primary"></button>
      </div>

      <div class="muted" id="tableLinksHint"></div>
      <div class="muted" id="tableLinksMsg" style="margin-top:8px"></div>
      <div id="tableLinksWrap" class="stack" style="margin-top:12px"></div>
    </div>
    </section>

    <section class="ops-section" data-admin-tab-section="menu" hidden>
    <div class="card">
      <h3 id="menuTitle" class="section-field-title"></h3>
      <div id="menu"></div>
    </div>
    </section>
  </div>
  </main>

  <div id="toastWrap"></div>

  <script src="/js/translations/en.js"></script>
  <script src="/js/translations/pt.js"></script>
  <script src="/js/translations/fi.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/vendor/qrcode-generator/qrcode.js"></script>

  <script>
// Cache browser storage keys, i18n helpers, and the main DOM elements used by
// the admin page so logic stays clear and repeated lookups are reduced.
    const TOKEN_KEY = "kof_admin_token_v1";
    const WHO_KEY = "kof_admin_who_v1";

    const PIN_EYE = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const PIN_EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function togglePin(inputId, btn) {
      const input = document.getElementById(inputId);
      const reveal = input.type === "password";
      input.type = reveal ? "text" : "password";
      btn.innerHTML = reveal ? PIN_EYE_OFF : PIN_EYE;
      btn.setAttribute("aria-label", reveal ? "Hide PIN" : "Show PIN");
    }

    const t = window.kofI18n.t;
    const translateError = window.kofI18n.translateError;
    function tf(key, fallback, vars = {}) {
      const value = t(key, vars);
      return value === key ? fallback : value;
    }

    const pageTitleEl = document.getElementById("pageTitle");
    const adminEyebrowEl = document.getElementById("adminEyebrow");
    const loginEl = document.getElementById("login");
    const appEl = document.getElementById("app");
    const whoLineEl = document.getElementById("whoLine");
    const adminToolbarEl = document.getElementById("adminToolbar");
    const loginMsgEl = document.getElementById("loginMsg");
    const pinMsgEl = document.getElementById("pinMsg");
    const userMsgEl = document.getElementById("userMsg");
    const addMsgEl = document.getElementById("addMsg");
    const ingredientMsgEl = document.getElementById("ingredientMsg");
    const tableLinksMsgEl = document.getElementById("tableLinksMsg");
    const usersWrapEl = document.getElementById("users");
    const tableLinksWrapEl = document.getElementById("tableLinksWrap");
    const menuWrapEl = document.getElementById("menu");
    const staffBtnEl = document.getElementById("staffBtn");
    const usersCardEl = document.getElementById("usersCard");
    const ingredientQuickCardEl = document.getElementById("ingredientQuickCard");
    const tableLinksCardEl = document.getElementById("tableLinksCard");
    const wifiQrCardEl = document.getElementById("wifiQrCard");
    const wifiSsidEl = document.getElementById("wifiSsid");
    const wifiPasswordEl = document.getElementById("wifiPassword");
    const wifiSecurityEl = document.getElementById("wifiSecurity");
    const wifiPasswordFieldEl = document.getElementById("wifiPasswordField");
    const wifiQrPreviewEl = document.getElementById("wifiQrPreview");
    const wifiQrTitleEl = document.getElementById("wifiQrTitle");
    const wifiQrHintEl = document.getElementById("wifiQrHint");
    const saveWifiBtnEl = document.getElementById("saveWifiBtn");
    const printWifiBtnEl = document.getElementById("printWifiBtn");
    const toastWrapEl = document.getElementById("toastWrap");
    const adminTabButtons = Array.from(document.querySelectorAll("[data-admin-tab-btn]"));
    const adminTabSections = Array.from(document.querySelectorAll("[data-admin-tab-section]"));

    const usernameEl = document.getElementById("username");
    const pinEl = document.getElementById("pin");
    const loginBtnEl = document.getElementById("loginBtn");
    const inventoryBtnEl = document.getElementById("inventoryBtn");
    const settingsBtnEl = document.getElementById("settingsBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const securityTitleEl = document.getElementById("securityTitle");
    const changeMyPinTitleEl = document.getElementById("changeMyPinTitle");
    const changePinBtnEl = document.getElementById("changePinBtn");
    const usersManagerTitleEl = document.getElementById("usersManagerTitle");
    const createUserTitleEl = document.getElementById("createUserTitle");
    const createUserBtnEl = document.getElementById("createUserBtn");
    const refreshUsersBtnEl = document.getElementById("refreshUsersBtn");
    const userListTitleEl = document.getElementById("userListTitle");
    const disableHintEl = document.getElementById("disableHint");
    const addItemTitleEl = document.getElementById("addItemTitle");
    const addItemBtnEl = document.getElementById("addItemBtn");
    const addIngredientTitleEl = document.getElementById("addIngredientTitle");
    const openInventoryBtnEl = document.getElementById("openInventoryBtn");
    const addIngredientBtnEl = document.getElementById("addIngredientBtn");
    const tableLinksTitleEl = document.getElementById("tableLinksTitle");
    const tableBaseUrlEl = document.getElementById("tableBaseUrl");
    const tableLinkCountEl = document.getElementById("tableLinkCount");
    const refreshTableLinksBtnEl = document.getElementById("refreshTableLinksBtn");
    const copyTableLinksBtnEl = document.getElementById("copyTableLinksBtn");
    const printTableLinksBtnEl = document.getElementById("printTableLinksBtn");
    const tableLinksHintEl = document.getElementById("tableLinksHint");
    const menuTitleEl = document.getElementById("menuTitle");
    const securityTabBtnEl = document.getElementById("securityTabBtn");
    const menuTabBtnEl = document.getElementById("menuTabBtn");
    const qrTabBtnEl = document.getElementById("qrTabBtn");

    let tableLinksCache = [];
    let publicConfig = {};
    let activeAdminTab = "security";

// Apply localized static UI labels and placeholders for the admin page.
    function applyTranslations() {
      document.title = tf("adminPage.title", tf("admin.title", "Kof Admin"));
      adminEyebrowEl.innerText = tf("common.admin", "Admin");
      pageTitleEl.innerText = tf("adminPage.title", tf("admin.title", "Kof Admin"));

      usernameEl.placeholder = tf("login.username", "username");
      pinEl.placeholder = tf("login.pin", "pin");
      loginBtnEl.innerText = tf("login.login", "Login");

      staffBtnEl.innerText = tf("common.staff", "Staff");
      inventoryBtnEl.innerText = tf("common.inventory", "Inventory");
      settingsBtnEl.innerText = tf("common.settings", "Settings");
      logoutBtnEl.innerText = tf("common.logout", "Logout");

      securityTitleEl.innerText = tf("adminPage.security", "Security");
      securityTabBtnEl.innerText = tf("adminPage.tabSecurity", "Security");
      menuTabBtnEl.innerText = tf("adminPage.tabMenu", "Menu");
      qrTabBtnEl.innerText = tf("adminPage.tabQr", "Table QR Codes");
      changeMyPinTitleEl.innerText = tf("adminPage.changeMyPin", "Change my PIN");
      document.getElementById("oldPin").placeholder = tf("settings.oldPin", "Old PIN");
      document.getElementById("newPin").placeholder = tf("settings.newPin", "New PIN");
      changePinBtnEl.innerText = tf("settings.changePin", "Change PIN");

      usersManagerTitleEl.innerText = tf("adminPage.usersManager", "Users (manager)");
      createUserTitleEl.innerText = tf("adminPage.createUser", "Create user");
      document.getElementById("uName").placeholder = tf("login.username", "username");
      document.getElementById("uPin").placeholder = tf("login.pin", "pin");
      createUserBtnEl.innerText = tf("adminPage.createUser", "Create user");
      refreshUsersBtnEl.innerText = tf("common.refresh", "Refresh");
      userListTitleEl.innerText = tf("adminPage.userList", "User list");
      disableHintEl.innerText = tf("adminPage.disableHint", "Disable = remove access. Reset PIN assigns a new random PIN.");

      addItemTitleEl.innerText = tf("adminPage.addItem", "Add item");
      document.getElementById("newName").placeholder = tf("common.name", "Name");
      document.getElementById("newDesc").placeholder = tf("adminPage.description", "Description");
      document.getElementById("newPrice").placeholder = tf("adminPage.price", "Price (€)");
      addItemBtnEl.innerText = tf("adminPage.addItem", "Add item");

      addIngredientTitleEl.innerText = tf("adminPage.addIngredient", "Add Ingredient");
      openInventoryBtnEl.innerText = tf("adminPage.openInventoryPage", "Open inventory page");
      document.getElementById("ingName").placeholder = tf("adminPage.ingredientName", "Ingredient name");
      document.getElementById("ingUnit").placeholder = tf("adminPage.ingredientUnit", "Unit (g, ml, pcs)");
      document.getElementById("ingStock").placeholder = tf("inventory.stockQty", "Stock quantity");
      document.getElementById("ingLow").placeholder = tf("inventory.lowThreshold", "Low threshold");
      addIngredientBtnEl.innerText = tf("adminPage.addIngredient", "Add Ingredient");

      wifiQrTitleEl.innerText = tf("adminPage.wifiQr", "Wi-Fi QR Code");
      wifiSsidEl.placeholder = tf("adminPage.wifiSsid", "Network name (SSID)");
      wifiPasswordEl.placeholder = tf("adminPage.wifiPassword", "Password");
      saveWifiBtnEl.innerText = tf("common.save", "Save");
      printWifiBtnEl.innerText = tf("common.print", "Print");
      wifiQrHintEl.innerText = tf("adminPage.wifiQrHint", "Display this QR at the entrance so customers can join your Wi-Fi before ordering.");

      tableLinksTitleEl.innerText = tf("adminPage.tableLinks", "Table QR Links");
      tableBaseUrlEl.placeholder = tf("adminPage.tableBaseUrl", "Base URL");
      tableLinkCountEl.placeholder = tf("adminPage.tableCount", "Table count");
      refreshTableLinksBtnEl.innerText = tf("common.refresh", "Refresh");
      copyTableLinksBtnEl.innerText = tf("common.copy", "Copy");
      printTableLinksBtnEl.innerText = tf("common.print", "Print");
      tableLinksHintEl.innerText = tf("adminPage.tableLinksHint", "Generate signed table URLs to turn into QR codes for each table.");

      menuTitleEl.innerText = tf("adminPage.menu", "Menu");
    }

    function setAdminTab(tab) {
      activeAdminTab = tab;

      adminTabButtons.forEach((button) => {
        const isActive = button.dataset.adminTabBtn === tab;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-selected", isActive ? "true" : "false");
      });

      adminTabSections.forEach((section) => {
        const isVisible = section.dataset.adminTabSection === tab;
        section.hidden = !isVisible;
        section.style.display = isVisible ? "flex" : "none";
        section.setAttribute("aria-hidden", isVisible ? "false" : "true");
      });
    }

    function usersTableSurfaceStyle() {
      if (!document.body.classList.contains("dark")) {
        return "";
      }

      return ' style="background:#1a211e;border-color:rgba(223,214,199,0.14);box-shadow:none;"';
    }

    function usersTableCellStyle() {
      if (!document.body.classList.contains("dark")) {
        return "";
      }

      return ' style="background:#1a211e;border-bottom-color:rgba(223,214,199,0.1);color:var(--dark-text-strong);"';
    }

    function menuSurfaceStyle() {
      if (!document.body.classList.contains("dark")) {
        return "";
      }

      return ' style="background:#1a211e;border-color:rgba(223,214,199,0.14);box-shadow:none;"';
    }

    function menuCellStyle() {
      if (!document.body.classList.contains("dark")) {
        return "";
      }

      return ' style="background:#1a211e;border-bottom-color:rgba(223,214,199,0.1);color:var(--dark-text-strong);"';
    }

    function menuHintStyle() {
      if (!document.body.classList.contains("dark")) {
        return "";
      }

      return ' style="color:var(--dark-muted);"';
    }

// Initialize the table link base URL field with the current origin so managers
// can keep it or replace it with the Raspberry Pi LAN address.
    function initializeTableBaseUrl() {
      if (!tableBaseUrlEl || String(tableBaseUrlEl.value || "").trim()) {
        return;
      }

      tableBaseUrlEl.value = publicConfig.public_base_url || window.location.origin;
    }

// Load public frontend config used by unauthenticated and authenticated pages.
    async function loadPublicConfig() {
      try {
        const response = await fetch("/api/config");

        if (!response.ok) {
          throw new Error(`Request failed (${response.status})`);
        }

        publicConfig = await response.json();
      } catch {
        publicConfig = {};
      }
    }

// Read the current admin auth token from browser storage.
    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

// Persist the current admin auth token in browser storage.
    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

// Clear the stored admin session from browser storage.
    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(WHO_KEY);
    }

// Escape user-controlled text before injecting it into HTML strings.
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

// Render a toast message using the shared fade-out only toast system.
    function toast(type, title, msg) {
      if (!toastWrapEl) {
        return;
      }

      const toastEl = document.createElement("div");
      toastEl.className = `toast ${type === "err" ? "err" : "ok"}`;
      toastEl.innerHTML = `
        <div class="tTitle">${escapeHtml(title || (type === "err" ? tf("common.error", "Error") : tf("common.done", "Done")))}</div>
        <div class="tMsg">${escapeHtml(msg || "")}</div>
      `;

      toastWrapEl.appendChild(toastEl);

      const ttlMs = type === "err" ? 4200 : 2200;

      setTimeout(() => {
        toastEl.classList.add("fade-out");

        setTimeout(() => {
          try {
            toastEl.remove();
          } catch {}
        }, 350);
      }, ttlMs);
    }

    function toastOk(title, msg) {
      toast("ok", title, msg);
    }

    function toastErr(title, msg) {
      toast("err", title, msg);
    }

// Call a protected admin API endpoint with the current bearer token and parse
// JSON responses consistently.
    async function api(path, opts = {}) {
      const headers = Object.assign(
        { "Content-Type": "application/json" },
        opts.headers || {}
      );

      const token = getToken();
      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }

      const response = await fetch(path, {
        ...opts,
        headers,
      });

      let data = {};

      try {
        data = await response.json();
      } catch {
        const text = await response.text().catch(() => "");
        data = text ? { error: text } : {};
      }

      if (!response.ok) {
        throw new Error(translateError(data.error || `Request failed (${response.status})`));
      }

      return data;
    }

// Show the authenticated admin application view and update the visible session
// identity label.
    function showApp() {
      loginEl.style.display = "none";
      appEl.style.display = "block";
      if (adminToolbarEl) {
        adminToolbarEl.style.display = "flex";
      }
      whoLineEl.textContent = localStorage.getItem(WHO_KEY) || "";
    }

// Redirect unauthenticated users to the dedicated login page.
    function showLogin() {
      location.href = "/login.html";
    }

// Apply the current dark mode state to the admin page body.
    function applyDarkMode(enabled) {
      document.body.classList.toggle("dark", !!enabled);
    }

// Load persisted admin user settings and apply the current dark mode setting.
    async function loadAndApplySettings() {
      const settings = await api("/api/admin/me/settings");
      window.kofI18n.setLanguage(settings?.language || window.kofI18n.DEFAULT_LANG);
      applyDarkMode(!!settings.dark_mode);
      applyTranslations();
      return settings;
    }

// Load the current admin identity label shown in the page header.
    async function loadWhoLine() {
      const me = await api("/api/admin/me");
      whoLineEl.textContent = tf("admin.loggedInAs", `Logged in as ${me.username} (${me.role})`, {
        username: me.username,
        role: me.role,
      });
      return me;

// Escape special characters in WiFi QR string values per the Wi-Fi EasyConnect spec.
    function escapeWifiValue(str) {
      return String(str || "").replace(/([\\;,":@])/g, "\\$1");
    }

// Build the Wi-Fi QR string for the given credentials.
// Format: WIFI:T:<security>;S:<ssid>;P:<password>;;
    function buildWifiQrString(ssid, password, security) {
      const s = escapeWifiValue(ssid);
      if (!s) return "";
      if (security === "nopass") {
        return `WIFI:T:nopass;S:${s};;`;
      }
      return `WIFI:T:${security};S:${s};P:${escapeWifiValue(password)};;`;
    }

// Regenerate and display the Wi-Fi QR preview whenever credentials change.

      const ssid = wifiSsidEl ? wifiSsidEl.value.trim() : "";

      if (wifiPasswordFieldEl) {

      if (!ssid) {
        wifiQrPreviewEl.innerHTML = "";
        if (printWifiBtnEl) printWifiBtnEl.style.display = "none";
        return;

      const qrStr = buildWifiQrString(ssid, password, security);

      if (!dataUrl) {
        wifiQrPreviewEl.innerHTML = "";
        if (printWifiBtnEl) printWifiBtnEl.style.display = "none";

      wifiQrPreviewEl.innerHTML = `<img
        src="${escapeHtml(dataUrl)}"
        alt="${escapeHtml(tf("adminPage.wifiQrAlt", "Wi-Fi QR code"))}"
        style="width:220px;max-width:100%;height:auto;border:1px solid #ddd;border-radius:12px;background:#fff;padding:8px"

// Build a QR image data URL locally in the browser so table QR generation works
// without internet access.
    function getTableQrImageUrl(url, size = 220) {
      const safeSize = Math.max(80, Math.min(1000, Number(size || 220)));

      if (typeof qrcode !== "function") {
        return "";
      }

      const qr = qrcode(0, "M");
      qr.addData(String(url || ""));
      qr.make();

      const moduleCount = qr.getModuleCount ? qr.getModuleCount() : 21;
      const cellSize = Math.max(2, Math.floor(safeSize / moduleCount));
      const margin = Math.max(4, Math.floor(cellSize * 2));

      return qr.createDataURL(cellSize, margin);
    }

// Read the editable menu row inputs for one item and send the patch request to
// persist the updated values.
    async function saveRow(id) {
      try {
        const inputs = [
          ...document.querySelectorAll(`input[data-id="${id}"]`),
        ];

        const payload = {};

        for (const input of inputs) {
          const field = input.dataset.field;

          if (field === "name") {
            payload.name = input.value;
          }

          if (field === "description") {
            payload.description = input.value;
          }

          if (field === "price_eur") {
            const cents = parseEuroToCents(input.value);

            if (cents === null) {
              throw new Error(tf("admin.invalidPrice", "Invalid price"));
            }

            payload.price_cents = cents;
          }
        }

        await api(`/api/admin/menu/${id}`, {
          method: "PATCH",
          body: JSON.stringify(payload),
        });

        toastOk(tf("common.save", "Save"), tf("admin.menuItemUpdated", `Menu item #${id} updated`, { id }));
        await loadMenu();
      } catch (error) {
        toastErr(tf("admin.saveFailed", "Save failed"), translateError(error));
      }
    }

      const description = document.getElementById("newDesc").value.trim();
      const priceInput = document.getElementById("newPrice").value;

      addMsgEl.innerText = "";

      try {
        const price_cents = parseEuroToCents(priceInput);

        if (price_cents === null) {
          throw new Error(tf("admin.invalidPriceHelp", "Invalid price. Use e.g. 10.00 or 10,00"));
        }

        await api("/api/admin/menu", {
          method: "POST",
          body: JSON.stringify({ name, description, price_cents }),
        });

        document.getElementById("newName").value = "";
        document.getElementById("newDesc").value = "";
        document.getElementById("newPrice").value = "";

        await loadMenu();

        addMsgEl.innerText = tf("admin.added", "Added.");
        toastOk(tf("admin.added", "Added"), tf("admin.addedToMenu", `${name} added to menu`, { name }));
      } catch (error) {
        addMsgEl.innerText = translateError(error);
        toastErr(tf("admin.addFailed", "Add failed"), translateError(error));
      }
    }

// Create a new ingredient from the quick admin form shown to managers.
    async function addIngredientQuick() {
      const name = document.getElementById("ingName").value.trim();
      const unit = document.getElementById("ingUnit").value.trim();
      const stock_qty = parseMaybeNumber(document.getElementById("ingStock").value);
      const low_stock_threshold = parseMaybeNumber(document.getElementById("ingLow").value);

      ingredientMsgEl.innerText = "";

      try {
        if (!name) {
          throw new Error(tf("inventory.ingredientNameRequired", "Ingredient name required"));
        }

        if (!unit) {
          throw new Error(tf("inventory.unitRequired", "Unit required"));
        }

        if (stock_qty === null) {
          throw new Error(tf("inventory.invalidStockQty", "Invalid stock quantity"));
        }

        if (low_stock_threshold === null) {
          throw new Error(tf("inventory.invalidLowThreshold", "Invalid low threshold"));
        }

        await api("/api/admin/inventory/ingredients", {
          method: "POST",
          body: JSON.stringify({ name, unit, stock_qty, low_stock_threshold }),
        });

        document.getElementById("ingName").value = "";
        document.getElementById("ingUnit").value = "g";
        document.getElementById("ingStock").value = "";
        document.getElementById("ingLow").value = "";

        ingredientMsgEl.innerText = tf("admin.ingredientAdded", "Ingredient added.");
        toastOk(tf("admin.ingredientAdded", "Ingredient added"), name);
      } catch (error) {
        ingredientMsgEl.innerText = translateError(error);
        toastErr(tf("admin.addIngredientFailed", "Add ingredient failed"), translateError(error));
      }
    }

// Parse a euro price string into integer cents while accepting both comma and
// dot decimal separators.
    function parseEuroToCents(input) {
      const normalized = String(input)
        .trim()
        .replace(/\s+/g, "")
        .replace(",", ".");

      const value = Number(normalized);

      if (!Number.isFinite(value)) {
        return null;
      }

      return Math.round(value * 100);
    }

// Parse a numeric input field that may be left empty. Empty values default to
// zero while invalid numeric input returns null.
    function parseMaybeNumber(input) {
      const normalized = String(input ?? "").trim();

      if (normalized === "") {
        return 0;
      }

      const parsed = Number(normalized.replace(",", "."));
      return Number.isFinite(parsed) ? parsed : null;
    }

// Refresh settings and role-based UI when the page is shown again from browser
// history or tab restore.
    window.addEventListener("pageshow", async () => {
      if (!getToken()) {
        return;
      }

      try {
        await loadAndApplySettings();
        await loadWhoLine();
        await applyRoleNav();
      } catch {}
    });

// Refresh settings and role-based UI whenever the tab becomes visible again.
    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState !== "visible") {
        return;
      }

      if (!getToken()) {
        return;
      }

      try {
        await loadAndApplySettings();
        await loadWhoLine();
        await applyRoleNav();
      } catch {}
    });

    adminTabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAdminTab(button.dataset.adminTabBtn);
      });
    });

// Boot the admin page by restoring the stored session when present and loading
// the authenticated admin interface.
    (async () => {
      await loadPublicConfig();
      applyTranslations();
      initializeTableBaseUrl();
      setAdminTab(activeAdminTab);

      if (getToken()) {
        try {
          showApp();
          await loadAndApplySettings();
          await loadWhoLine();
          await applyRoleNav();
          await loadMenu();
        } catch {
          clearToken();
          showLogin();
        }
      } else {
        showLogin();
      }
    })();
  </script>
