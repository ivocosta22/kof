<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121715" media="(prefers-color-scheme: dark)" />
  <title>Kof Order History</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="staff-page">
  <main class="admin-shell">

    <section class="ops-hero ops-hero-board">
      <div class="top">
        <div>
          <div class="ops-eyebrow" id="historyEyebrow"></div>
          <div class="ops-title" id="pageTitle"></div>
          <div class="ops-subtitle" id="sub"></div>
        </div>
        <div class="row ops-toolbar">
          <button onclick="goStaff()" id="staffBtn" class="secondary"></button>
          <button onclick="goInventory()" id="inventoryBtn"></button>
          <button onclick="goSettings()" id="settingsBtn"></button>
          <button id="adminBtn" style="display:none" onclick="goAdmin()"></button>
          <button onclick="logout()" id="logoutBtn" class="danger-soft"></button>
        </div>
      </div>
    </section>

    <section class="ops-panel" id="historyPanel">
      <div id="historyList" class="ops-stack"></div>
    </section>

  </main>

  <div id="toastWrap"></div>

  <script src="/js/translations/en.js"></script>
  <script src="/js/translations/pt.js"></script>
  <script src="/js/translations/fi.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const t = window.kofI18n.t;
    const translateError = window.kofI18n.translateError;

    const TOKEN_KEY = "kof_admin_token_v1";

    const pageTitleEl = document.getElementById("pageTitle");
    const historyEyebrowEl = document.getElementById("historyEyebrow");
    const subEl = document.getElementById("sub");
    const staffBtnEl = document.getElementById("staffBtn");
    const inventoryBtnEl = document.getElementById("inventoryBtn");
    const settingsBtnEl = document.getElementById("settingsBtn");
    const adminBtnEl = document.getElementById("adminBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const historyListEl = document.getElementById("historyList");
    const toastWrap = document.getElementById("toastWrap");

    function tf(key, fallback, vars = {}) {
      const value = t(key, vars);
      return value === key ? fallback : value;
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function money(cents) {
      return `EUR ${(Number(cents || 0) / 100).toFixed(2)}`;
    }

    function applyDarkMode(enabled) {
      document.body.classList.toggle("dark", !!enabled);
    }

    function toast(type, title, msg) {
      if (!toastWrap) return;
      const el = document.createElement("div");
      el.className = `toast ${type === "err" ? "err" : "ok"}`;
      el.innerHTML = `
        <div class="tTitle">${escapeHtml(title || "")}</div>
        <div class="tMsg">${escapeHtml(msg || "")}</div>
      `;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.classList.add("fade-out");
        setTimeout(() => { try { el.remove(); } catch {} }, 350);
      }, type === "err" ? 4200 : 2200);
    }

    async function api(path, opts = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
      const token = getToken();
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(path, { ...opts, headers });
      let data = {};
      try { data = await response.json(); } catch { }
      if (!response.ok) throw new Error(translateError(data.error || `Request failed (${response.status})`));
      return data;
    }

    function formatTableLabel(value) {
      const normalized = String(value || "").trim();
      const tableWord = tf("fulfillment.tableLabel", "Table");
      return normalized ? `${tableWord} ${normalized}` : tableWord;
    }

    function destinationBlock(order) {
      if (order.fulfillment_type === "table") {
        return `<div class="pill paid">${escapeHtml(formatTableLabel(order.table_label))}</div>`;
      }
      const name = order.customer_label ? escapeHtml(order.customer_label) : tf("staff.pickupUnknown", "Pickup");
      return `
        <div class="pill paid">${escapeHtml(tf("fulfillment.counter", "Counter"))}</div>
        <div class="pill paid">${escapeHtml(name)}</div>
      `;
    }

    function statusPillClass(value) {
      return `pill status-${String(value || "").toLowerCase()}`;
    }

    function paymentText(value) {
      return value === "paid" ? tf("payment.paid", "Paid") : tf("payment.unpaid", "Unpaid");
    }

    function boardCardStyle() {
      return document.body.classList.contains("dark")
        ? `style="background:#1a211e;border-color:rgba(223,214,199,0.14);box-shadow:none;"`
        : "";
    }

    function renderOrders(orders) {
      if (!orders.length) {
        historyListEl.innerHTML = `<div class="muted">${escapeHtml(tf("history.noOrders", "No past orders found."))}</div>`;
        return;
      }

      // Group by created_date
      const byDate = new Map();
      for (const order of orders) {
        const date = order.created_date || order.created_at?.slice(0, 10) || "Unknown";
        if (!byDate.has(date)) byDate.set(date, []);
        byDate.get(date).push(order);
      }

      let html = "";

      for (const [date, group] of byDate) {
        html += `<h3 style="margin:18px 0 10px;font-size:1rem;color:var(--text-muted)">${escapeHtml(date)}</h3>`;

        for (const order of group) {
          const itemsHtml = (order.items || []).map((item) => {
            const mods = Array.isArray(item.chosen_modifiers) && item.chosen_modifiers.length
              ? `<div class="muted" style="margin-left:8px">+ ${item.chosen_modifiers.map(escapeHtml).join(", ")}</div>`
              : "";
            return `<div><span>${item.qty}× ${escapeHtml(item.item_name)}</span>${mods}</div>`;
          }).join("") || `<div class="muted">${escapeHtml(tf("staff.noItems", "No items"))}</div>`;

          const totalCents = order.total_cents ?? (order.items || []).reduce((s, i) => s + Number(i.line_total_cents || 0), 0);

          html += `
            <div class="card staff-board-card" style="margin:0 0 10px" ${boardCardStyle()}>
              <div class="row" style="justify-content:space-between;align-items:flex-start;gap:10px">
                <div>
                  <div class="big">
                    ${escapeHtml(tf("history.idLabel", `ID #${order.id}`, { id: order.id }))}
                    <span class="muted" style="font-size:0.8rem;font-weight:400;margin-left:8px">
                      ${escapeHtml(tf("staff.orderLabel", `Order #${order.order_number}`, { orderNumber: order.order_number }))}
                    </span>
                  </div>
                  <div class="row" style="margin-top:6px;flex-wrap:wrap;gap:6px">
                    ${destinationBlock(order)}
                  </div>
                </div>
                <div class="row" style="gap:6px;flex-wrap:wrap;flex-shrink:0">
                  <div class="${statusPillClass(order.status)}">${escapeHtml(tf(`status.${order.status}`, order.status))}</div>
                  <div class="pill ${order.payment_status === "paid" ? "paid" : "unpaid"}">${escapeHtml(paymentText(order.payment_status))}</div>
                </div>
              </div>

              ${order.note ? `<div class="statusline" style="margin-top:8px"><div class="muted"><i>${escapeHtml(order.note)}</i></div></div>` : ""}

              <div class="items" style="margin-top:10px">${itemsHtml}</div>

              <div class="statusline" style="margin-top:10px;justify-content:space-between">
                <div class="time">${escapeHtml(order.created_at || "")}</div>
                <div><b>${escapeHtml(money(totalCents))}</b></div>
              </div>

              ${order.payment_status === "paid"
                ? `<div class="btnrow" style="margin-top:10px">
                     <button class="secondary" onclick="window.open('/receipt.html?id=${order.id}','_blank','noopener')">${escapeHtml(tf("common.receipt", "Receipt"))}</button>
                   </div>`
                : ""}
            </div>
          `;
        }
      }

      historyListEl.innerHTML = html;
    }

    function applyTranslations() {
      document.title = tf("history.title", "Kof Order History");
      historyEyebrowEl.textContent = tf("common.staff", "Staff");
      pageTitleEl.textContent = tf("history.title", "Kof Order History");
      staffBtnEl.textContent = tf("common.staff", "Staff");
      inventoryBtnEl.textContent = tf("common.inventory", "Inventory");
      settingsBtnEl.textContent = tf("common.settings", "Settings");
      adminBtnEl.textContent = tf("common.admin", "Admin");
      logoutBtnEl.textContent = tf("common.logout", "Logout");
    }

    function goStaff() { location.href = "/staff.html"; }
    function goInventory() { location.href = "/inventory.html"; }
    function goSettings() { location.href = "/settings.html"; }
    function goAdmin() { location.href = "/admin.html"; }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem("kof_admin_who_v1");
      location.href = "/login.html";
    }

    async function boot() {
      if (!getToken()) {
        location.href = "/login.html";
        return;
      }

      const me = await api("/api/admin/me");
      adminBtnEl.style.display = me.role === "manager" ? "inline-block" : "none";

      const settings = await api("/api/admin/me/settings");
      window.kofI18n.setLanguage(settings?.language || window.kofI18n.DEFAULT_LANG);
      applyDarkMode(!!settings.dark_mode);
      applyTranslations();

      subEl.textContent = tf("history.loading", "Loading…");

      const data = await api("/api/orders/history");
      const orders = Array.isArray(data.orders) ? data.orders : [];

      subEl.textContent = tf(
        "history.subtitle",
        `${orders.length} past order${orders.length === 1 ? "" : "s"}`,
        { count: orders.length }
      );

      renderOrders(orders);
    }

    boot().catch((error) => {
      localStorage.removeItem("kof_admin_token_v1");
      toast("err", tf("common.sessionError", "Session error"), translateError(error?.message || "Please login again"));
      location.href = "/login.html";
    });
  </script>
</body>
</html>
